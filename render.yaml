services:
  - type: web
    name: whasender-auth
    runtime: node
    rootDir: auth-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 5d
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /api/health
